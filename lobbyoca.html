<style>
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0d0d0d; }
  .griglia { display: flex; gap: 2px; background: #ff9800; padding: 2px; min-height: 100vh; }
  .pannello { background: #111; }
  .col-comandi { width: 260px; }
  .col-centro { flex: 1; display: flex; flex-direction: column; }
  .col-top { width: 260px; }

  .titolo-pannello {
    background: #000; color: #fff; padding: 14px 18px; font-weight: bold; font-size: 15px;
    border-bottom: 2px solid #ff9800;
  }
  .corpo-pannello { padding: 18px; }

  label { display: block; font-size: 13px; font-weight: bold; margin: 14px 0 6px; color: #ddd; }
  select, input[type="text"] {
    width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #333; background: #1c1c1c; color: #fff;
  }

  .btn-tipo {
    width: 100%; padding: 11px; margin-top: 8px; border-radius: 6px; border: 1px solid #333;
    background: #1c1c1c; color: #ccc; cursor: pointer; font-weight: bold; text-align: left;
  }
  .btn-tipo.selezionato { background: #ff9800; color: #000; border-color: #ff9800; }

  .btn-crea-grande {
    width: 100%; padding: 14px; margin-top: 18px; border: none; border-radius: 6px;
    background: #ffd400; color: #000; font-weight: bold; cursor: pointer; font-size: 15px;
  }
  .btn-crea-grande:hover { background: #fff; }
  .btn-crea-grande.torneo { background: #ba68c8; color: #fff; margin-top: 8px; }

  .stato-connessione { font-size: 11px; padding: 4px 10px; border-radius: 12px; margin-left: auto; }
  .connesso { background: #2e7d32; color: #fff; }
  .disconnesso { background: #555; color: #ccc; }
  .titolo-pannello.flex { display: flex; align-items: center; }

  .partita-card {
    background: #1c1c1c; border: 1px solid #333; border-radius: 8px; padding: 14px 18px; margin-bottom: 12px;
  }
  .partita-riga-info { color: #ddd; font-size: 14px; margin: 4px 0; }
  .badge-torneo { color: #ba68c8; font-weight: bold; }
  .btn-entra {
    width: 100%; margin-top: 10px; padding: 10px; border: none; border-radius: 6px;
    background: #1c1c1c; border: 1px solid #ff9800; color: #ff9800; font-weight: bold; cursor: pointer;
  }
  .btn-entra:hover { background: #ff9800; color: #000; }
  .btn-entra:disabled { border-color: #444; color: #555; cursor: not-allowed; }
  .nessuna-partita { color: #777; font-style: italic; padding: 18px; }

  .chat-box { flex-grow: 1; overflow-y: auto; padding: 14px 18px; min-height: 150px; max-height: 220px; }
  .chat-msg { color: #ddd; font-size: 13px; margin-bottom: 6px; }
  .chat-msg b { color: #ff9800; }
  .chat-input-riga { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid #333; }
  .chat-input-riga input { flex-grow: 1; }
  .btn-invia { padding: 10px 20px; border: none; border-radius: 6px; background: #ffd400; font-weight: bold; cursor: pointer; }

  .giocatore-online-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; color: #ddd; font-size: 13px; }
  .puntino-verde { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; }
  .online-conteggio { color: #4caf50; font-weight: bold; }

  .overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
  }
  .overlay.aperto { display: flex; }
  .popup-nick { background: #111; border: 2px solid #ff9800; border-radius: 12px; padding: 28px; width: 300px; }
  .popup-nick h3 { color: #ff9800; margin-top: 0; }
  .popup-nick button { width: 100%; margin-top: 15px; padding: 12px; border: none; border-radius: 6px; background: #ffd400; font-weight: bold; cursor: pointer; }
</style>

<div class="griglia">
  <div class="pannello col-comandi">
    <div class="titolo-pannello">⚙️ Comandi</div>
    <div class="corpo-pannello">
      <label>⏱️ Tempo di mossa</label>
      <select id="input-tempo">
        <option value="15">15 secondi</option>
        <option value="30">30 secondi</option>
        <option value="60">60 secondi</option>
      </select>

      <label>🏆 Punti partita</label>
      <select id="input-punti">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
      </select>

      <label>Numero massimo giocatori</label>
      <select id="input-max-giocatori">
        <option value="2">2</option><option value="3">3</option>
        <option value="4" selected>4</option><option value="5">5</option>
        <option value="6">6</option><option value="7">7</option><option value="8">8</option>
      </select>

      <label>Tipo partita</label>
      <button class="btn-tipo selezionato" id="btn-pubblica">🔓 Pubblica</button>
      <button class="btn-tipo" id="btn-privata">🔒 Privata</button>

      <button class="btn-crea-grande" id="btn-crea-partita">Crea partita +</button>
      <button class="btn-crea-grande torneo" id="btn-crea-torneo">🏆 Crea Torneo +</button>
    </div>
  </div>

  <div class="pannello col-centro">
    <div class="titolo-pannello flex">
      🎲 Partite
      <span id="stato-connessione" class="stato-connessione disconnesso">🔴 Connessione...</span>
    </div>
    <div class="corpo-pannello" id="lista-partite" style="flex-grow:1; overflow-y:auto;">
      <p class="nessuna-partita">Nessuna partita attiva al momento.</p>
    </div>

    <div class="titolo-pannello">💬 Chat stanza</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="chat-input-riga">
      <input type="text" id="input-chat-msg" placeholder="Scrivi un messaggio">
      <button class="btn-invia" id="btn-invia-chat">Invia</button>
    </div>
  </div>

  <div class="pannello col-top">
    <div class="titolo-pannello">⭐ Top Players</div>
    <div class="corpo-pannello" style="color:#888; font-size:13px;">Sistema punteggi non ancora attivo.</div>

    <div class="titolo-pannello" id="nome-stanza-badge">🏠 STANZA</div>
    <div class="corpo-pannello">
      <div><span class="online-conteggio" id="conteggio-online">0</span> online</div>
      <div id="lista-online" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay-nickname">
  <div class="popup-nick">
    <h3>Come vuoi essere chiamato?</h3>
    <input type="text" id="input-nickname" placeholder="Il tuo nickname">
    <button id="btn-conferma-nickname">Conferma</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const nomeStanza = params.get("stanza") || "BAR";

document.getElementById("nome-stanza-badge").textContent =
"🏠 " + nomeStanza;

  let mioNickname = localStorage.getItem('nickname_giocatore');
  let socket;
  let tipoSelezionato = 'no'; // pubblica di default

  document.getElementById('btn-pubblica').onclick = () => {
    tipoSelezionato = 'no';
    document.getElementById('btn-pubblica').classList.add('selezionato');
    document.getElementById('btn-privata').classList.remove('selezionato');
  };
  document.getElementById('btn-privata').onclick = () => {
    tipoSelezionato = 'si';
    document.getElementById('btn-privata').classList.add('selezionato');
    document.getElementById('btn-pubblica').classList.remove('selezionato');
  };

  function connettiWebSocket() {
    socket = new WebSocket('wss://gioco-oca-server.onrender.com');

    socket.onopen = () => {
      document.getElementById('stato-connessione').className = 'stato-connessione connesso';
      document.getElementById('stato-connessione').textContent = '🟢 Connesso';
      socket.send(JSON.stringify({ tipo: 'entraStanza', stanza: nomeStanza, nome: mioNickname }));
    };
    socket.onclose = () => {
      document.getElementById('stato-connessione').className = 'stato-connessione disconnesso';
      document.getElementById('stato-connessione').textContent = '🔴 Riconnessione...';
      setTimeout(connettiWebSocket, 3000);
    };
    socket.onmessage = (msg) => {
      const dati = JSON.parse(msg.data);
      if (dati.tipo === 'listaPartite') mostraListaPartite(dati.partite);
      if (dati.tipo === 'aggiornaOnline') mostraOnline(dati.giocatori);
      if (dati.tipo === 'messaggioChat') aggiungiMessaggioChat(dati.nome, dati.testo);
    };
  }

  function mostraOnline(giocatori) {
    document.getElementById('conteggio-online').textContent = giocatori.length;
    document.getElementById('lista-online').innerHTML = giocatori.map(n =>
      `<div class="giocatore-online-item"><span class="puntino-verde"></span>${n}</div>`
    ).join('');
  }

  function mostraListaPartite(partite) {
    const container = document.getElementById('lista-partite');
    if (!partite || partite.length === 0) {
      container.innerHTML = '<p class="nessuna-partita">Nessuna partita attiva al momento.</p>';
      return;
    }
    container.innerHTML = '';
    partite.forEach(p => {
      const piena = p.giocatori.length >= p.maxGiocatori;
      const card = document.createElement('div');
      card.className = 'partita-card';
      card.innerHTML = `
        <div class="partita-riga-info">👤 ${p.giocatori[0] || '—'} ${p.modalita === 'torneo' ? '<span class="badge-torneo">🏆 TORNEO</span>' : ''}</div>
        <div class="partita-riga-info">${p.privata ? '🔒' : '🔓'} ${p.privata ? 'Privata' : 'Pubblica'}</div>
        <div class="partita-riga-info">⏱️ ${p.tempoMossa} secondi</div>
        <div class="partita-riga-info">🏆 ${p.puntiPartita} punti</div>
        <div class="partita-riga-info">👥 ${p.giocatori.length} su ${p.maxGiocatori}</div>
        <button class="btn-entra" data-partita="${p.id}" ${piena ? 'disabled' : ''}>${piena ? 'Piena' : 'Entra'}</button>
      `;
      container.appendChild(card);
    });
    container.querySelectorAll('.btn-entra:not(:disabled)').forEach(btn => {
      btn.onclick = () => socket.send(JSON.stringify({ tipo: 'unisciti', partitaId: btn.dataset.partita }));
    });
  }

  function aggiungiMessaggioChat(nome, testo) {
    const box = document.getElementById('chat-box');
    const riga = document.createElement('div');
    riga.className = 'chat-msg';
    riga.innerHTML = `<b>${nome}»</b> ${testo}`;
    box.appendChild(riga);
    box.scrollTop = box.scrollHeight;
  }

  function creaPartita(modalita) {
    const nome = mioNickname + " - Partita";
    socket.send(JSON.stringify({
      tipo: 'creaPartita',
      nomePartita: nome,
      maxGiocatori: parseInt(document.getElementById('input-max-giocatori').value),
      privata: tipoSelezionato === 'si',
      tempoMossa: document.getElementById('input-tempo').value,
      puntiPartita: document.getElementById('input-punti').value,
      modalita: modalita
    }));
  }

  document.getElementById('btn-crea-partita').onclick = () => creaPartita('normale');
  document.getElementById('btn-crea-torneo').onclick = () => creaPartita('torneo');

  document.getElementById('btn-invia-chat').onclick = () => {
    const input = document.getElementById('input-chat-msg');
    if (!input.value.trim()) return;
    socket.send(JSON.stringify({ tipo: 'messaggioChat', testo: input.value.trim() }));
    input.value = '';
  };
  document.getElementById('input-chat-msg').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-invia-chat').click();
  });

  if (!mioNickname) {
    document.getElementById('overlay-nickname').classList.add('aperto');
  } else {
    connettiWebSocket();
  }
  document.getElementById('btn-conferma-nickname').onclick = () => {
    const v = document.getElementById('input-nickname').value.trim();
    mioNickname = v || ("Giocatore" + Math.floor(Math.random() * 1000));
    localStorage.setItem('nickname_giocatore', mioNickname);
    document.getElementById('overlay-nickname').classList.remove('aperto');
    connettiWebSocket();
  };
</script>
