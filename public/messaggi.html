<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Messaggi - Giochi Società</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #101820; color: #e8e8e8; font-family: Arial, sans-serif; line-height: 1.6; }
.contenitore { max-width: 700px; margin: 0 auto; padding: 40px 24px 80px; }
.intestazione { text-align: center; margin-bottom: 34px; padding-bottom: 22px; border-bottom: 2px solid #ffd700; }
.intestazione h1 { color: #ffd700; font-size: 28px; margin: 0 0 8px; }
.intestazione p { color: #999; margin: 0; font-size: 14px; }
.avviso-card { background: #1e2a38; border: 1px solid #7a5c00; border-left: 4px solid #ffb300; border-radius: 10px; padding: 16px 20px; margin-bottom: 14px; }
.avviso-card .data { font-size: 12px; color: #999; margin-bottom: 6px; }
.avviso-card .testo { font-size: 15px; color: #ffe9a8; }
.nessun-messaggio { text-align: center; color: #888; font-style: italic; padding: 40px 20px; background: #1e2a38; border-radius: 10px; }
.link-home { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #ffd700; color: #111; text-decoration: none; border-radius: 8px; font-weight: bold; }
.link-home:hover { background: #ffaa00; }
</style>
</head>
<body>
<div class="contenitore">
  <div class="intestazione">
    <h1>💬 I tuoi messaggi</h1>
    <p>Avvisi e comunicazioni ufficiali ricevute dallo staff</p>
  </div>
  <div id="listaMessaggi">Caricamento...</div>
  <a href="lobby.html" class="link-home">← Torna al gioco</a>
</div>

<script>
const authToken = localStorage.getItem("authToken");
if (!authToken) window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href);

async function carica() {
  try {
    const risposta = await fetch("/api/me", { headers: { "Authorization": "Bearer " + authToken } });
    if (!risposta.ok) { window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href); return; }
    const dati = await risposta.json();
    mostraMessaggi(dati.avvisi || []);
  } catch (e) {
    document.getElementById("listaMessaggi").innerHTML = "<p>Errore nel caricamento dei messaggi.</p>";
  }
}

function mostraMessaggi(avvisi) {
  const container = document.getElementById("listaMessaggi");
  if (avvisi.length === 0) {
    container.innerHTML = '<div class="nessun-messaggio">Nessun messaggio al momento. Tutto in regola! ✅</div>';
    return;
  }
  container.innerHTML = avvisi.slice().reverse().map(a => `
    <div class="avviso-card">
      <div class="data">${new Date(a.data).toLocaleString("it-IT")}</div>
      <div class="testo">⚠️ ${a.motivo}</div>
    </div>
  `).join("");
}
carica();
</script>
</body>
</html>
