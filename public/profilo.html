<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Profilo - Giochi Società</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #101820; color: #e8e8e8; font-family: Arial, sans-serif; line-height: 1.6; }
.contenitore { max-width: 600px; margin: 0 auto; padding: 40px 24px 80px; }
.scatola { background: #1e2a38; border: 1px solid #333; border-radius: 14px; padding: 30px; text-align: center; }
#avatarGrande { width: 84px; height: 84px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 34px; font-weight: bold; margin: 0 auto 16px; }
h1 { color: #ffd700; font-size: 24px; margin: 0 0 4px; }
.email { color: #999; font-size: 14px; margin-bottom: 24px; }
.statistiche { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
.stat { text-align: center; }
.stat .numero { font-size: 26px; font-weight: bold; color: #ffd700; }
.stat .etichetta { font-size: 12px; color: #999; }
.link-home { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #ffd700; color: #111; text-decoration: none; border-radius: 8px; font-weight: bold; }
.link-home:hover { background: #ffaa00; }
</style>
</head>
<body>
<div class="contenitore">
  <div class="scatola">
    <div id="avatarGrande"></div>
    <h1 id="nomeProfilo">Caricamento...</h1>
    <div class="email" id="emailProfilo"></div>
    <div class="statistiche">
      <div class="stat"><div class="numero" id="numVinte">-</div><div class="etichetta">Vittorie</div></div>
      <div class="stat"><div class="numero" id="numGiocate">-</div><div class="etichetta">Partite giocate</div></div>
    </div>
    <a href="lobby.html" class="link-home">← Torna al gioco</a>
  </div>
</div>

<script>
const PALETTE = ["#6a2c70", "#1e40af", "#43a047", "#f57c00", "#c0ca33", "#e53935", "#00838f", "#8d6e63"];
function coloreDaNome(nome) {
  let somma = 0;
  for (let i = 0; i < nome.length; i++) somma += nome.charCodeAt(i);
  return PALETTE[somma % PALETTE.length];
}

const authToken = localStorage.getItem("authToken");
if (!authToken) window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href);

async function carica() {
  try {
    const risposta = await fetch("/api/me", { headers: { "Authorization": "Bearer " + authToken } });
    if (!risposta.ok) { window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href); return; }
    const dati = await risposta.json();

    document.getElementById("nomeProfilo").textContent = dati.nickname;
    document.getElementById("emailProfilo").textContent = dati.email;
    document.getElementById("numVinte").textContent = dati.partiteVinte || 0;
    document.getElementById("numGiocate").textContent = dati.partiteGiocate || 0;

    const avatar = document.getElementById("avatarGrande");
    avatar.textContent = dati.nickname.charAt(0).toUpperCase();
    avatar.style.background = coloreDaNome(dati.nickname);
  } catch (e) {
    document.getElementById("nomeProfilo").textContent = "Errore nel caricamento";
  }
}
carica();
</script>
</body>
</html>
