<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Registrati - Giochi Società</title>
<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }
body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #101820; }
.scatola { background: #1e2a38; border: 2px solid #ffd700; border-radius: 14px; padding: 36px; width: 360px; max-width: 90%; }
h1 { color: #ffd700; text-align: center; font-size: 22px; margin-top: 0; }
label { display: block; color: #ccc; font-size: 13px; font-weight: bold; margin: 14px 0 6px; }
input { width: 100%; padding: 11px; border-radius: 8px; border: none; background: #101820; color: #fff; font-size: 14px; }
button { width: 100%; margin-top: 22px; padding: 13px; border: none; border-radius: 8px; background: #ffd700; color: #111; font-weight: bold; font-size: 15px; cursor: pointer; }
button:hover { background: #ffaa00; }
.errore { color: #ff6b6b; font-size: 13px; margin-top: 12px; text-align: center; min-height: 16px; }
.link-sotto { text-align: center; margin-top: 16px; font-size: 13px; color: #aaa; }
.link-sotto a { color: #ffd700; text-decoration: none; }
</style>
</head>
<body>

<div class="scatola">
  <h1>Crea il tuo account</h1>

  <label>Email</label>
  <input type="email" id="email" placeholder="tuaemail@esempio.com">

  <label>Nickname (sarà fisso, visibile agli altri giocatori)</label>
  <input type="text" id="nickname" placeholder="Es. LucaSolfrini">

  <label>Password (almeno 6 caratteri)</label>
  <input type="password" id="password" placeholder="••••••••">

  <label>Conferma password</label>
  <input type="password" id="passwordConferma" placeholder="••••••••">

  <button onclick="registrati()">Registrati</button>
  <div class="errore" id="errore"></div>

  <div class="link-sotto">
    Hai già un account? <a id="linkLogin" href="login.html">Accedi</a>
  </div>
</div>

<script>
const parametri = new URLSearchParams(window.location.search);
const redirect = parametri.get("redirect");
if (redirect) document.getElementById("linkLogin").href = "login.html?redirect=" + encodeURIComponent(redirect);

async function registrati() {
  const email = document.getElementById("email").value.trim();
  const nickname = document.getElementById("nickname").value.trim();
  const password = document.getElementById("password").value;
  const passwordConferma = document.getElementById("passwordConferma").value;
  const erroreEl = document.getElementById("errore");
  erroreEl.textContent = "";

  if (!email || !nickname || !password) { erroreEl.textContent = "Compila tutti i campi."; return; }
  if (password !== passwordConferma) { erroreEl.textContent = "Le due password non coincidono."; return; }

  try {
    const risposta = await fetch("/api/registrati", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, nickname, password })
    });
    const dati = await risposta.json();
    if (!risposta.ok) { erroreEl.textContent = dati.errore || "Errore durante la registrazione."; return; }

    localStorage.setItem("authToken", dati.token);
    localStorage.setItem("nickname", dati.nickname);
    localStorage.setItem("ruolo", dati.ruolo);

    window.location.href = redirect || "https://solfriniluca1.wixstudio.com/giochisocieta";

  } catch (e) {
    erroreEl.textContent = "Errore di connessione al server.";
  }
}
</script>

</body>
</html>
