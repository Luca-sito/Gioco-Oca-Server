<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Auth Bridge</title>
</head>
<body style="margin:0;">
<script>
function leggiLocalStorage() {
  return {
    token: localStorage.getItem("authToken"),
    nickname: localStorage.getItem("nickname")
  };
}
function pulisciLocalStorage() {
  localStorage.removeItem("authToken");
  localStorage.removeItem("nickname");
  localStorage.removeItem("ruolo");
}

// Fallback "*" finché non riceviamo una vera richiesta con un'origine nota;
// dopo la prima richiediStato, rispondiamo sempre a quella origine precisa.
let origineRichiedente = "*";

function invia(messaggio) {
  window.parent.postMessage(messaggio, origineRichiedente);
}

async function controllaStato() {
  const { token } = leggiLocalStorage();
  if (!token) { invia({ tipo: "statoAuth", loggato: false }); return; }

  try {
    const risposta = await fetch("https://gioco-oca-server.onrender.com/api/me", {
      headers: { "Authorization": "Bearer " + token }
    });

    if (!risposta.ok) {
      pulisciLocalStorage();
      invia({ tipo: "statoAuth", loggato: false });
      return;
    }

    const dati = await risposta.json();

    if (dati.stato === "bannato" || dati.stato === "sospeso") {
      pulisciLocalStorage();
      invia({ tipo: "statoAuth", loggato: false });
      return;
    }

    localStorage.setItem("nickname", dati.nickname);
    localStorage.setItem("ruolo", dati.ruolo || "utente");
    invia({ tipo: "statoAuth", loggato: true, nickname: dati.nickname, ruolo: dati.ruolo || "utente" });
  } catch (e) {
    // Server irraggiungibile (es. Render in fase di risveglio): non forziamo il logout
    invia({ tipo: "statoAuth", loggato: false, temporaneo: true });
  }
}

window.addEventListener("message", (evento) => {
  if (!evento.data || typeof evento.data !== "object") return;

  if (evento.data.tipo === "richiediStato") {
    origineRichiedente = evento.origin; // rispondiamo esattamente a chi ci ha chiesto
    controllaStato();
  }
  if (evento.data.tipo === "logout") {
    origineRichiedente = evento.origin;
    pulisciLocalStorage();
    invia({ tipo: "statoAuth", loggato: false });
  }
});

// Controllo anche subito al caricamento, senza aspettare messaggi in arrivo
controllaStato();
</script>
</body>
</html>
